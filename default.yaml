seed: 42
output_root: outputs
data:
  npy_path: dataset/input_sample.npy
  val_ratio: 0.1
  subset_size: null
  num_workers: 0
  batch_size: 256
  condition_dim: 2
transform:
  use_bct: true
  bct_epsilon: 1.0e-6
  standardize: true
  disable_input_dim0_bct: true
model:
  latent_dim: 32
  generator_hidden_dims: [128, 256, 256, 128]
  generator:
    condition_encoder:
      enabled: true
      hidden_dims: [64, 64]
      activation: gelu
  critic_hidden_dims: [128, 256, 128]
  critic:
    minibatch_discrimination:
      enabled: true
      stat: mean_abs_diff
  quality_hidden_dims: [256, 256, 128]
  activation: gelu
  use_spectral_norm: true
optim:
  lr_g: 1.0e-4
  lr_c: 1.0e-4
  lr_quality: 1.0e-3
  betas: [0.5, 0.9]
train:
  use_three_stage: true
  epochs_gan: 5
  epochs_quality: 3
  n_critic: 5
  wgan_gp_lambda: 10.0
  physics_weight: 1.0
  physics_loss_weights:
    mass_conservation: 1.0
    non_negative: 1.0
  physics_species_bounds:
    enabled: true
    weight: 1.0
    use_hinge: true
  grad_clip_norm: 5.0
  log_interval: 20
  three_stage:
    reg_pretrain_epochs: 3
    classifier_real_mix_ratio: 0.5
    generator_wgan_weight: 0.0
    loss_balance:
      enabled: true
      ema_beta: 0.98
      eps: 1.0e-6
      phys_clip_max: 5.0
      lambda_quality: 1.0
      lambda_phys: 0.05
      lambda_wgan: 0.1
      lambda_cond: 0.0
quality:
  default_mode: hybrid
  judge_mode: hybrid
  mode: hybrid
  real_mix_ratio: 0.5
  eval_batches: 8
  regression_input_path: dataset/input_sample.npy
  regression_target_path: dataset/output_sample.npy
  hard_sample_direction: larger_error_better
  oracle:
    mechanism_path: mechanism/Burke2012_s9r23.yaml
    time_step: 1.0e-7
    reference_pressure: 101325.0
  hybrid:
    w_classifier: 0.8
    w_regression: 0.2
  error_regression:
    enabled: true
generate:
  target_size: 60000
  sample_batch_size: 1024
  max_attempt_batches: 20000
  output_path: generated_dataset_60000_nofilter.npy
  filter:
    enable_double_step: false
    enable_qdot_screen: false
    qdot_screen:
      alpha: 0.1
      cq: 10.0
      temp_low: 800.0
      temp_high: 2600.0
      temp_step_cap: 2600.0
      reference_size: 5000
